<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Travelyt Offline</title>
    <style>
      :root {
        color-scheme: light;
        --navy: #071a4f;
        --red: #ff6868;
        --paper: #f5f0ee;
        --ink: #13204a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 32px, 420px);
        padding: 32px 24px;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(7, 26, 79, 0.1);
      }

      .brand {
        margin-bottom: 28px;
        color: var(--navy);
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 0 0 12px;
        color: var(--navy);
        font-size: 28px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: rgba(19, 32, 74, 0.72);
        font-size: 16px;
        line-height: 1.5;
      }

      button {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 12px;
        background: var(--navy);
        color: #ffffff;
        font: inherit;
        font-size: 15px;
        font-weight: 700;
      }

      .status {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 16px;
        color: var(--red);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--red);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">Travelyt</div>
      <div class="status"><span class="dot"></span> Connection unavailable</div>
      <h1>Your trip details are waiting.</h1>
      <p>
        Reconnect to load bookings, live bag status, driver updates, and payment
        pages.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
