name: Android Release (.aab for Google Play)

# Manually triggered: builds a signed Android App Bundle in the cloud.
# Download the artifact, then upload it to Google Play Console via the browser.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform + build-tools 36
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" >/dev/null
          yes | sdkmanager --licenses >/dev/null

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/travelyt-release.p12"

      - name: Build signed release bundle
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/travelyt-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload .aab
        uses: actions/upload-artifact@v4
        with:
          name: travelyt-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
